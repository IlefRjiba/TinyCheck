<div class="backgroundImage">
    <div>
        <h1>hey</h1>
    <div class="card">
        <h2 class="card-header">Sign Up</h2>
        <form class="form">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email">
          </div>
          <div class="form-group">
            <label for="number">Phone Number</label>
            <input type="number" class="form-control" id="number" placeholder="Enter your phone number">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password">
          </div>
          <div class="form-group">
            <label for="passwordconfirm">Confirm your password</label>
            <input type="password" class="form-control" id="passwordconfirm" placeholder="Confirm your password">
          </div>
          <button type="submit" class="btn submit-button">Submit</button>
          <a href="#" class="forgot-password">Forgot password?</a>
        </form>
      </div>
    </div>
</div>
